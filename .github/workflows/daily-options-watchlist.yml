name: Daily Options Watchlist

on:
  schedule:
    - cron: "30 13 * * 1-5"
    - cron: "30 14 * * 1-5"
  workflow_dispatch:

jobs:
  send-watchlist:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Stop duplicate scheduled run unless it is 6 AM Pacific
        if: github.event_name == 'schedule'
        run: |
          PT_HOUR="$(TZ=America/Los_Angeles date +%H)"
          if [ "$PT_HOUR" != "06" ]; then
            echo "Skipping duplicate daylight/standard-time schedule."
            exit 0
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Send watchlist to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WATCHLIST_TICKERS: ${{ vars.WATCHLIST_TICKERS }}
          MAX_RESULTS: ${{ vars.MAX_RESULTS }}
          SKIP_TRADING_DAY_CHECK: "false"
        run: python main.py
