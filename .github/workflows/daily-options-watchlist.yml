name: Daily Options Watchlist

on:
  schedule:
    # GitHub schedules can be delayed, so poll frequently around the target time.
    # The Pacific-time gate below keeps the real send window at 6:25-7:30 AM PT.
    - cron: "*/5 13-15 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-options-watchlist
  cancel-in-progress: false

jobs:
  send-watchlist:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Pacific time window
        id: clock
        shell: bash
        run: |
          PT_DATE="$(TZ=America/Los_Angeles date +%F)"
          PT_HOUR="$(TZ=America/Los_Angeles date +%H)"
          PT_MINUTE="$(TZ=America/Los_Angeles date +%M)"
          PT_MINUTES=$((10#$PT_HOUR * 60 + 10#$PT_MINUTE))
          SHOULD_RUN="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_RUN="true"
          elif [ "$PT_MINUTES" -ge 385 ] && [ "$PT_MINUTES" -le 450 ]; then
            SHOULD_RUN="true"
          fi

          echo "pt_date=$PT_DATE" >> "$GITHUB_OUTPUT"
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "Pacific time: $PT_DATE $PT_HOUR:$PT_MINUTE; should_run=$SHOULD_RUN"

      - name: Restore today's sent marker
        id: sent_today
        if: github.event_name == 'schedule' && steps.clock.outputs.should_run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .watchlist-sent
          key: daily-options-watchlist-${{ steps.clock.outputs.pt_date }}

      - name: Explain skipped run
        if: github.event_name == 'schedule' && (steps.clock.outputs.should_run != 'true' || steps.sent_today.outputs.cache-hit == 'true')
        run: |
          echo "Skipping: outside the 6:25-7:30 AM Pacific delivery window, or today's watchlist was already sent."

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || (steps.clock.outputs.should_run == 'true' && steps.sent_today.outputs.cache-hit != 'true')
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || (steps.clock.outputs.should_run == 'true' && steps.sent_today.outputs.cache-hit != 'true')
        run: python -m pip install -r requirements.txt

      - name: Send watchlist to Discord
        id: send_watchlist
        if: github.event_name == 'workflow_dispatch' || (steps.clock.outputs.should_run == 'true' && steps.sent_today.outputs.cache-hit != 'true')
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WATCHLIST_TICKERS: ${{ vars.WATCHLIST_TICKERS }}
          MAX_RESULTS: ${{ vars.MAX_RESULTS }}
          SKIP_TRADING_DAY_CHECK: "false"
        run: python main.py

      - name: Create today's sent marker
        if: success() && github.event_name == 'schedule' && steps.clock.outputs.should_run == 'true' && steps.sent_today.outputs.cache-hit != 'true'
        run: |
          mkdir -p .watchlist-sent
          echo "${{ steps.clock.outputs.pt_date }}" > .watchlist-sent/date.txt

      - name: Save today's sent marker
        if: success() && github.event_name == 'schedule' && steps.clock.outputs.should_run == 'true' && steps.sent_today.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .watchlist-sent
          key: daily-options-watchlist-${{ steps.clock.outputs.pt_date }}
